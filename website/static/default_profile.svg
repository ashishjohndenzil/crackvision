<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f766e" />
      <stop offset="100%" stop-color="#0d9488" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.15" />
    </filter>
  </defs>
  <!-- Background circle with sleek premium gradient -->
  <circle cx="60" cy="60" r="60" fill="url(#gradient)" />
  <!-- Minimalist Head & Shoulders vector icon -->
  <g filter="url(#shadow)">
    <!-- Head -->
    <circle cx="60" cy="46" r="18" fill="#ffffff" />
    <!-- Shoulders -->
    <path d="M60,68 C38,68 30,82 30,96 L90,96 C90,82 82,68 60,68 Z" fill="#ffffff" />
  </g>
</svg>
